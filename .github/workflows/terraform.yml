on:
  push:
    paths-ignore:
      - "**/*.md"
      - ".vscode/**"
      - ".idea/**"
      - ".gitignore"
    tags:
      - "v*"
  pull_request:
    branches:
      - master

jobs:
  terraform:
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Add Mask
        run: echo "::add-mask::${{ secrets.AWS_ACCOUND_ID }}"
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_ARN_GITHUB_ACTION }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: make terraform-init
        env:
          BACKEND_S3_BUCKET: ${{ secrets.TERRAFORM_BACKEND_S3_BUCKET }}
          BACKEND_S3_KEY: ${{ vars.TERRAFORM_BACKEND_S3_KEY }}
          BACKEND_REGION: ${{ vars.AWS_REGION }}
      - name: Terraform plan
        run: terraform plan
        if: ${{ github.ref_type == 'branch' }}
      - name: Terraform apply
        run: terraform apply -auto-approve
        if: ${{ github.ref_type == 'tag' }}
